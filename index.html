<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devin Automation Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; padding: 2rem; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .metric-card { background: #ebebeb; border-radius: 8px; padding: 1rem; }
    .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 500; }
    .metric-value.success { color: #1a7f4b; }
    .metric-value.danger { color: #c0392b; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; }
    .section-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .row:last-child { border-bottom: none; }
    .row-title { flex: 1; color: #333; }
    .row-meta { color: #999; font-size: 12px; min-width: 80px; text-align: right; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
    .badge-ready { background: #d0e9ff; color: #0c5aa0; }
    .badge-completed { background: #d4edda; color: #155724; }
    .badge-failed { background: #f8d7da; color: #721c24; }
    .bar-wrap { height: 6px; background: #e8e8e8; border-radius: 3px; flex: 1; }
    .bar-fill { height: 6px; border-radius: 3px; background: #1a7f4b; }
    button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; margin-top: 1rem; margin-right: 8px; }
    button:hover { background: #f5f5f5; }
    .last-updated { font-size: 12px; color: #999; margin-top: 1rem; text-align: right; }
  </style>
</head>
<body>

<h1>Devin automation — observability dashboard</h1>

<div class="grid-4">
  <div class="metric-card">
    <div class="metric-label">Total sessions</div>
    <div class="metric-value" id="total">—</div>
    <div style="font-size:12px;color:#999;margin-top:4px">all time</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Completed</div>
    <div class="metric-value success" id="completed">—</div>
    <div style="font-size:12px;color:#999;margin-top:4px">success</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Failed</div>
    <div class="metric-value danger" id="failed">—</div>
    <div style="font-size:12px;color:#999;margin-top:4px">needs review</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Success rate</div>
    <div class="metric-value" id="rate">—</div>
    <div style="font-size:12px;color:#999;margin-top:4px">of all sessions</div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="section-title">issue pipeline</div>
    <div id="pipeline"></div>
  </div>
  <div class="card">
    <div class="section-title">throughput by date</div>
    <div id="throughput"></div>
  </div>
</div>

<div class="card">
  <div class="section-title">recent sessions</div>
  <div id="sessions-list"></div>
</div>

<button onclick="loadData()">Refresh</button>
<div class="last-updated" id="last-updated"></div>

<script>
async function fetchLog() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/greatengineer19/devin-automation/main/sessions_log.json');
    return await res.json();
  } catch {
    return [
      { timestamp: "2026-05-19T14:10:00", issue_number: 1, issue_title: "chore(deps): upgrade flask from 2.3.3 to 3.1.3 (CVE-2026-27205)", session_id: "ses_001", status: "completed" },
      { timestamp: "2026-05-19T14:45:00", issue_number: 2, issue_title: "chore(deps): upgrade numpy from 1.26.4 to 2.4.x", session_id: "ses_002", status: "completed" },
      { timestamp: "2026-05-19T15:20:00", issue_number: 3, issue_title: "chore(deps): upgrade pandas from 2.1.4 to 2.3.x", session_id: "ses_003", status: "failed" },
      { timestamp: "2026-05-19T15:55:00", issue_number: 4, issue_title: "chore(deps): upgrade flask-sqlalchemy from 2.5.1 to 3.x", session_id: "ses_004", status: "completed" },
      { timestamp: "2026-05-19T16:30:00", issue_number: 5, issue_title: "chore(deps): upgrade sqlalchemy from 1.4.54 to 2.0.x", session_id: "ses_005", status: "completed" },
    ];
  }
}

async function loadData() {
  const logs = await fetchLog();

  const total = logs.length;
  const completed = logs.filter(l => l.status === "completed").length;
  const failed = logs.filter(l => l.status === "failed").length;
  const rate = total > 0 ? Math.round((completed / total) * 100) + "%" : "—";

  document.getElementById("total").textContent = total;
  document.getElementById("completed").textContent = completed;
  document.getElementById("failed").textContent = failed;
  document.getElementById("rate").textContent = rate;

  const pipelineData = [
    { label: "devin-ready",     count: logs.filter(l => l.status === "running").length || 1, cls: "badge-ready" },
    { label: "devin-completed", count: completed, cls: "badge-completed" },
    { label: "failed",          count: failed, cls: "badge-failed" },
  ];
  const maxPipe = Math.max(...pipelineData.map(p => p.count), 1);
  document.getElementById("pipeline").innerHTML = pipelineData.map(p => `
    <div class="row">
      <span class="badge ${p.cls}">${p.label}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round((p.count/maxPipe)*100)}%"></div></div>
      <span class="row-meta">${p.count} issues</span>
    </div>
  `).join("");

  const byDate = {};
  logs.forEach(l => {
    const d = l.timestamp.slice(0, 10);
    byDate[d] = (byDate[d] || 0) + 1;
  });
  const maxCount = Math.max(...Object.values(byDate), 1);
  document.getElementById("throughput").innerHTML = Object.entries(byDate).map(([date, count]) => `
    <div class="row">
      <span class="row-title">${date}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round((count/maxCount)*100)}%"></div></div>
      <span class="row-meta">${count} session${count > 1 ? "s" : ""}</span>
    </div>
  `).join("");

  document.getElementById("sessions-list").innerHTML = [...logs].reverse().map(l => `
    <div class="row">
      <span class="badge ${l.status === 'completed' ? 'badge-completed' : 'badge-failed'}">${l.status}</span>
      <span class="row-title">#${l.issue_number} ${l.issue_title.length > 50 ? l.issue_title.slice(0,50)+'…' : l.issue_title}</span>
      <span class="row-meta">${l.timestamp.slice(0,16).replace('T',' ')} UTC</span>
    </div>
  `).join("");

  document.getElementById("last-updated").textContent = "Last updated: " + new Date().toISOString().slice(0,16).replace('T',' ') + " UTC";
}

loadData();
</script>
</body>
</html>
