name: Devin Auto-Remediation

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 0 * * *'  # runs every night at midnight
  workflow_dispatch:

jobs:
  scan:
    name: Scan for vulnerabilities
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devin-automation .

      - name: Run vulnerability scanner
        run: |
          docker run --rm \
            -e CURRENT_GITHUB_TOKEN=${{ secrets.CURRENT_GITHUB_TOKEN }} \
            -e CURRENT_GITHUB_REPO=${{ secrets.CURRENT_GITHUB_REPO }} \
            devin-automation python scan_issues.py

  remediate:
    name: Remediate approved issues
    if: ${{ github.event_name == 'issues' && github.event.label.name == 'devin-approved' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devin-automation .

      - name: Run Devin automation
        run: |
          docker run --rm \
            -e DEVIN_API_KEY=${{ secrets.DEVIN_API_KEY }} \
            -e CURRENT_GITHUB_TOKEN=${{ secrets.CURRENT_GITHUB_TOKEN }} \
            -e CURRENT_GITHUB_REPO=${{ secrets.CURRENT_GITHUB_REPO }} \
            devin-automation python automate.py